services:
  - type: web
    name: hsbc-ominiai-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-backend.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: WARM_MODELS_ON_STARTUP
        value: "false"
      - key: ANALYTICS_EMBEDDINGS_ENABLED
        value: "false"
      - key: RAG_EMBEDDINGS_ENABLED
        value: "false"
